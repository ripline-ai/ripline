# Implement Story (OpenClaw)
# Runs inside OpenClaw: uses default agent runner.
# Set OPENCLAW_WORKSPACE to the project workspace path (e.g. /home/user/myproject).
# Invoked by spec_then_build_queue_openclaw when spawning implementation tasks.
id: implement_story_openclaw
name: Implement Story (OpenClaw)
entry: [task_in]
nodes:
  - id: task_in
    type: input

  - id: implement
    type: agent
    mode: execute
    cwd: "{{env.OPENCLAW_WORKSPACE}}"
    timeoutSeconds: 600
    prompt: |
      Implement the following development story in the Wintermute codebase. Write the necessary code changes, then commit your work with a descriptive commit message referencing the story ID.

      Story ID: {{task.id}}
      Title: {{task.title}}

      Details:
      {{task.detail}}

  - id: result
    type: output
    source: implement

edges:
  - { from: { node: task_in },   to: { node: implement } }
  - { from: { node: implement }, to: { node: result } }
