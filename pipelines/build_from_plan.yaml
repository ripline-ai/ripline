# Build From Plan
# Fetches a planned Wintermute idea, extracts its stories, and implements them
# sequentially via Claude Code agents, each committing directly to main/master.
# After all stories are implemented, writes tests, verifies the build, stages,
# and promotes to production.
#
# Inputs:
#   idea_id — Wintermute idea ID (required)
#
# Flow:
#   intake → parse_plan → story_loop → write_tests → build_verify
#          → reload_staging → verify_staging → patch_complete → promote → result

id: build_from_plan
name: Build From Plan
queue: build
entry: [intake]

nodes:
  - id: intake
    type: input

  # ── 1. Parse plan from inputs ─────────────────────────────────────────────
  # Wintermute passes idea data directly as inputs — no HTTP fetch needed.
  - id: parse_plan
    type: transform
    expression: |
      (function() {
        var stories = JSON.parse(inputs.stories_json || '[]');
        return {
          stories: stories,
          idea: {
            title: inputs.idea_title,
            mvpScope: inputs.idea_mvp_scope
          }
        };
      })()

  # ── 2. Loop over stories sequentially ────────────────────────────────────
  - id: story_loop
    type: loop
    collection: "JSON.parse(inputs.stories_json || '[]')"
    itemVar: story
    body:
      entry:
        - implement_story
      nodes:
        - id: implement_story
          type: agent
          runner: claude-code
          mode: execute
          dangerouslySkipPermissions: true
          cwd: /home/openclaw
          timeoutSeconds: 900
          prompt: |
            You are implementing a development story as part of a larger feature build.

            ## Context
            Idea: {{idea_title}}
            Idea ID: {{idea_id}}

            ## Story to Implement
            ID: {{loop.story.id}}
            Title: {{loop.story.title}}
            Description: {{loop.story.description}}
            Acceptance Criteria:
            {{(loop.story.acceptanceCriteria || []).map(function(c){return '- '+c}).join('\n')}}

            ## Full Implementation Spec
            {{idea_mvp_scope}}

            ## Instructions
            1. Determine the project directory from the idea's projectId (~/wintermute or ~/ripline).
            2. Ensure you are on the main branch (or master for Wintermute):
               git -C <project-dir> checkout main 2>/dev/null || git -C <project-dir> checkout master
            3. Implement the story described above. Make focused, clean changes.
            4. Do NOT write tests — that happens in a dedicated write_tests step after all stories are done.
            5. Commit your work directly to that branch with message: "{{loop.story.id}}: {{loop.story.title}}"
            6. Output a brief summary of what was implemented (1-3 sentences).

        - id: story_result
          type: output
          source: implement_story

  # ── 3. Write tests ────────────────────────────────────────────────────────
  - id: write_tests
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw
    timeoutSeconds: 900
    prompt: |
      All stories for the feature below have been implemented. Your job is to write
      tests that cover the acceptance criteria for each story and any integration
      points between them. Work in the relevant project directory.

      ## Idea
      Title: {{idea_title}}
      ID: {{idea_id}}

      ## MVP Scope / Stories
      {{idea_mvp_scope}}

      ## Story Implementation Summaries
      {{story_loop.text}}

      ## Steps
      1. Determine the project directory from the idea's projectId (~/wintermute or ~/ripline).
      2. Ensure you are on the main branch (or master for Wintermute).
      3. Write tests covering:
         - Each story's acceptance criteria (regression tests)
         - Integration points between stories, if relevant
      4. Tests should document correct behavior — they are not driving implementation.
      5. Do NOT run the tests — that happens in build_verify.
      6. Commit with message: test: add coverage for {{idea_title}} [{{idea_id}}]

      Output a summary: what tests were written, what scenarios they cover, which files were added or modified.

  # ── 4. Build verification ─────────────────────────────────────────────────
  - id: build_verify
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw/wintermute
    timeoutSeconds: 600
    prompt: |
      Run a full build and unit-test verification after the feature implementation
      and test additions.

      Implementation summary:
      {{story_loop.text}}

      Test summary:
      {{write_tests.text}}

      Run these commands using the Bash tool in the relevant project directory
      (determine from the idea's projectId — ~/wintermute or ~/ripline):
      1. cd <project-dir> && npm run build 2>&1 | tail -20
      2. cd <project-dir> && npm test -- --passWithNoTests --testPathIgnorePatterns=e2e 2>&1 | tail -30

      If anything fails, attempt one fix and re-run. If it still fails after one fix attempt,
      report the failure and stop — do not iterate further.

      Report clearly: pass/fail, and what (if anything) required a fix.

  # ── 5. Reload staging ────────────────────────────────────────────────────
  - id: reload_staging
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw
    timeoutSeconds: 120
    prompt: |
      Sync the production vault to staging, then reload both staging services so they
      pick up the freshly-built code. Use the Bash tool to run these three commands:

      1. ~/wintermute/scripts/vault-sync
      2. /home/openclaw/.npm-global/bin/pm2 reload wintermute-staging
      3. /home/openclaw/.npm-global/bin/pm2 reload ripline-staging

      Output "staging ready" when all three succeed, or report the error and stop.

  # ── 6. E2E smoke test against staging ────────────────────────────────────
  - id: verify_staging
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw/wintermute
    timeoutSeconds: 300
    prompt: |
      Run the e2e smoke tests against the staging stack to verify the feature
      end-to-end before promoting to production.

      Use the Bash tool:

        cd /home/openclaw/wintermute && \
          WINTERMUTE_URL=http://localhost:3001 RIPLINE_URL=http://localhost:4002 \
          npx jest tests/e2e/smoke-consolidated-flow.test.ts --no-coverage 2>&1 | tail -30

      If all tests pass, output "staging verified — ready to promote".
      If any tests fail, output "STAGING VERIFICATION FAILED" followed by the failure
      details. Do not proceed — the pipeline will continue to the promote step but
      promote will see this failure and refuse to reload production.

  # ── 7. Mark idea as done ──────────────────────────────────────────────────
  - id: patch_complete
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw
    timeoutSeconds: 90
    prompt: |
      Run this exact command using the Bash tool:

      curl -s -X PATCH {{wintermute_base_url}}/api/ideas/{{idea_id}} \
        -H "Content-Type: application/json" \
        -d '{"status":"done"}'

      Output only the response JSON, nothing else.

  # ── 8. Promote to production ──────────────────────────────────────────────
  - id: promote
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw
    timeoutSeconds: 300
    prompt: |
      Check the staging verification result, then promote to production if it passed.

      Staging result:
      {{verify_staging.text}}

      If the staging result contains "STAGING VERIFICATION FAILED", output
      "promote: ABORTED — staging verification failed, production NOT reloaded"
      and stop. Do not run any further commands.

      Otherwise, run the promote script using the Bash tool:

        ~/wintermute/bin/promote

      If it exits 0, output "promote: success — production reloaded".
      If it exits non-zero, output "promote: FAILED — production NOT reloaded"
      followed by the script output.
      Do not attempt to fix failures — just report them.

  - id: result
    type: output
    source: promote

edges:
  - { from: { node: intake },          to: { node: parse_plan } }
  - { from: { node: parse_plan },      to: { node: story_loop } }
  - { from: { node: story_loop },      to: { node: write_tests } }
  - { from: { node: write_tests },     to: { node: build_verify } }
  - { from: { node: build_verify },    to: { node: reload_staging } }
  - { from: { node: reload_staging },  to: { node: verify_staging } }
  - { from: { node: verify_staging },  to: { node: patch_complete } }
  - { from: { node: patch_complete },  to: { node: promote } }
  - { from: { node: promote },         to: { node: result } }
