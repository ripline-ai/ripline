# Build From Plan
# Fetches a planned Wintermute idea, extracts its stories, and implements them
# in parallel dependency waves via Claude Code agents, each committing directly to main/master.
# After all stories are implemented, writes tests, verifies the build, stages,
# and promotes to production.
#
# Inputs:
#   idea_id — Wintermute idea ID (required)
#   maxParallelStories — max stories to run concurrently per wave (default 3)
#
# Flow:
#   intake → parse_plan → compute_waves → story_loop → write_tests → build_verify
#          → reload_staging → verify_staging → validate_build_output
#          → create_tech_debt_items → promote → backup → result
#
# Note: Terminal status ("done" / "errored") is written exclusively by the
# Ripline webhook handler (single-writer rule). No pipeline step PATCHes
# the idea status.

id: build_from_plan
name: Build From Plan
queue: build
entry: [intake]
container: {}
retry:
  maxAttempts: 3
  backoffMs: 30000
  backoffMultiplier: 2
  retryableCategories: [transient, unknown]

nodes:
  - id: intake
    type: input

  # ── 1. Parse plan from inputs ─────────────────────────────────────────────
  # Wintermute passes idea data directly as inputs — no HTTP fetch needed.
  # AC3: Validates that stories_json is a valid JSON array with ≥1 element.
  - id: parse_plan
    type: transform
    expression: |
      (function() {
        var raw = inputs.stories_json || '[]';
        var stories;
        try { stories = JSON.parse(raw); } catch(e) {
          throw new Error('parse_plan: stories_json is not valid JSON — got: ' + String(raw).slice(0, 200));
        }
        if (!Array.isArray(stories)) {
          throw new Error('parse_plan: stories_json must be a JSON array, got ' + typeof stories);
        }
        if (stories.length === 0) {
          throw new Error('parse_plan: stories_json is an empty array — cannot build with zero stories');
        }
        return {
          stories: stories,
          idea: {
            title: inputs.idea_title,
            mvpScope: inputs.idea_mvp_scope
          }
        };
      })()

  # ── 1b. Compute dependency waves ─────────────────────────────────────────
  # Validates the dependency graph and groups stories into parallel waves.
  # When stories form a linear chain, waves degrade to one story per wave
  # (effectively sequential execution).
  - id: compute_waves
    type: transform
    expression: |
      (function() {
        var stories = artifacts.parse_plan.stories;
        var byId = {};
        for (var i = 0; i < stories.length; i++) byId[stories[i].id] = stories[i];
        // Validate dependsOn references
        for (var i = 0; i < stories.length; i++) {
          var deps = stories[i].dependsOn || [];
          for (var j = 0; j < deps.length; j++) {
            if (!byId[deps[j]]) throw new Error('compute_waves: story "' + stories[i].id + '" depends on unknown story "' + deps[j] + '"');
          }
        }
        // Kahn's algorithm for wave grouping
        var inDeg = {}, dependents = {};
        for (var i = 0; i < stories.length; i++) {
          inDeg[stories[i].id] = (stories[i].dependsOn || []).length;
          dependents[stories[i].id] = [];
        }
        for (var i = 0; i < stories.length; i++) {
          var deps = stories[i].dependsOn || [];
          for (var j = 0; j < deps.length; j++) dependents[deps[j]].push(stories[i].id);
        }
        var waves = [], current = [];
        for (var i = 0; i < stories.length; i++) {
          if (inDeg[stories[i].id] === 0) current.push(stories[i].id);
        }
        var processed = 0;
        while (current.length > 0) {
          var wave = current.map(function(id) { return byId[id]; });
          wave.sort(function(a, b) { return (a.order || 0) - (b.order || 0) || a.id.localeCompare(b.id); });
          waves.push(wave);
          processed += wave.length;
          var next = [];
          for (var w = 0; w < wave.length; w++) {
            var children = dependents[wave[w].id];
            for (var c = 0; c < children.length; c++) {
              inDeg[children[c]]--;
              if (inDeg[children[c]] === 0) next.push(children[c]);
            }
          }
          current = next;
        }
        if (processed < stories.length) {
          var stuck = stories.filter(function(s) { return inDeg[s.id] > 0; }).map(function(s) { return s.id; });
          throw new Error('compute_waves: dependency cycle among stories: ' + stuck.join(', '));
        }
        return { waves: waves, waveCount: waves.length, totalStories: stories.length };
      })()

  # ── 2. Loop over stories in parallel dependency waves ───────────────────
  # Uses mode: parallel to execute independent stories concurrently.
  # maxConcurrency is controlled by the maxParallelStories input (default 3).
  # When stories form a linear dependency chain, each wave has one story,
  # degrading gracefully to sequential execution.
  - id: story_loop
    type: loop
    mode: parallel
    collection: "(function() { var s = JSON.parse(inputs.stories_json || '[]'); if (!Array.isArray(s) || s.length === 0) throw new Error('story_loop: stories_json must be a non-empty JSON array'); return s; })()"
    itemVar: story
    # maxConcurrency is resolved from the maxParallelStories input at runtime (default 3)
    body:
      pipelineId: implement_story
      nodes:
        - id: implement_story
          type: agent
          runner: claude-code
          mode: execute
          dangerouslySkipPermissions: true
          cwd: /home/openclaw
          timeoutSeconds: 900
          prompt: ""
        - id: story_result
          type: output
          source: implement_story

  # ── 3. Write tests ────────────────────────────────────────────────────────
  - id: write_tests
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw
    timeoutSeconds: 900
    prompt: |
      All stories for the feature below have been implemented. Your job is to write
      tests that cover the acceptance criteria for each story and any integration
      points between them. Work in the relevant project directory.

      ## Idea
      Title: {{idea_title}}
      ID: {{idea_id}}

      ## MVP Scope / Stories
      {{idea_mvp_scope}}

      ## Story Implementation Summaries
      {{story_loop.text}}

      ## Steps
      1. Determine the project directory from the idea's projectId (~/wintermute or ~/ripline).
      2. Ensure you are on the main branch (or master for Wintermute).
      3. Write tests covering:
         - Each story's acceptance criteria (regression tests)
         - Integration points between stories, if relevant
      4. Tests should document correct behavior — they are not driving implementation.
      5. Do NOT run the tests — that happens in build_verify.
      6. Commit with message: test: add coverage for {{idea_title}} [{{idea_id}}]

      Output a summary: what tests were written, what scenarios they cover, which files were added or modified.

  # ── 4. Build verification ─────────────────────────────────────────────────
  - id: build_verify
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw/wintermute
    timeoutSeconds: 600
    prompt: |
      Run a full build and unit-test verification after the feature implementation
      and test additions.

      Implementation summary:
      {{story_loop.text}}

      Test summary:
      {{write_tests.text}}

      Run these commands using the Bash tool in the relevant project directory
      (determine from the idea's projectId — ~/wintermute or ~/ripline):
      1. cd <project-dir> && npm run build 2>&1 | tail -20
      2. cd <project-dir> && npm test -- --passWithNoTests --testPathIgnorePatterns=e2e 2>&1 | tail -30

      If anything fails, attempt one fix and re-run. If it still fails after one fix attempt,
      report the failure and stop — do not iterate further.

      Report clearly: pass/fail, and what (if anything) required a fix.

  # ── 5. Reload staging ────────────────────────────────────────────────────
  - id: reload_staging
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw
    timeoutSeconds: 120
    prompt: |
      Sync the production vault to staging, then reload both staging services so they
      pick up the freshly-built code. Use the Bash tool to run these three commands:

      1. ~/wintermute/scripts/vault-sync
      2. /home/openclaw/.npm-global/bin/pm2 reload wintermute-staging
      3. /home/openclaw/.npm-global/bin/pm2 reload ripline-staging

      Output "staging ready" when all three succeed, or report the error and stop.

  # ── 6. E2E smoke test against staging ────────────────────────────────────
  - id: verify_staging
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw/wintermute
    timeoutSeconds: 300
    prompt: |
      Run the e2e smoke tests against the staging stack to verify the feature
      end-to-end before promoting to production.

      Use the Bash tool:

        cd /home/openclaw/wintermute && \
          WINTERMUTE_URL=http://localhost:3001 RIPLINE_URL=http://localhost:4002 \
          npx jest tests/e2e/smoke-consolidated-flow.test.ts --no-coverage 2>&1 | tail -30

      If all tests pass, output "staging verified — ready to promote".
      If any tests fail, output "STAGING VERIFICATION FAILED" followed by the failure
      details. Do not proceed — the pipeline will continue to the promote step but
      promote will see this failure and refuse to reload production.

  # ── 6b. Validate build artifacts before completing ──────────────────────
  # AC3: Ensure story_loop produced real output (not nulls from rate-limit).
  - id: validate_build_output
    type: transform
    expression: |
      (function() {
        var loopResult = artifacts.story_loop;
        if (!loopResult) {
          throw new Error('validate_build_output: story_loop produced no output — build may have failed silently');
        }
        var results = Array.isArray(loopResult) ? loopResult : (loopResult.value || loopResult);
        if (!Array.isArray(results)) {
          throw new Error('validate_build_output: story_loop output is not an array — got: ' + typeof results);
        }
        var nullCount = 0;
        for (var i = 0; i < results.length; i++) {
          if (results[i] == null || results[i] === '') nullCount++;
        }
        if (nullCount === results.length && results.length > 0) {
          throw new Error('validate_build_output: all ' + results.length + ' story results are null/empty — likely a rate-limit or API failure');
        }
        return { validated: true, totalStories: results.length, nullStories: nullCount };
      })()

  # ── 7. Create tech-debt follow-up items ─────────────────────────────────
  # Reads the idea's techDebt field, parses each bullet into a separate idea,
  # POSTs each to /api/ideas, and PATCHes the created IDs back to the source.
  # No-ops gracefully if techDebt is empty; logs errors but never throws.
  - id: create_tech_debt_items
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw
    timeoutSeconds: 180
    prompt: |
      Create tech-debt follow-up items from the source idea's techDebt field.

      ## Source Idea
      ID: {{idea_id}}
      Title: {{idea_title}}
      Project ID: {{project_id}}
      Wintermute URL: {{wintermute_base_url}}

      ## Instructions
      1. Fetch the source idea to get its techDebt field:
         curl -s {{wintermute_base_url}}/api/ideas/{{idea_id}}

      2. Parse the techDebt field. It is a markdown string with bullet points.
         Extract each bullet (lines starting with "- " or "* ") as a separate item.
         If techDebt is empty, null, undefined, or has no bullet points, output
         "No tech debt items to create — skipping." and stop. Do NOT error.

      3. For each bullet, POST a new idea:
         curl -s -X POST {{wintermute_base_url}}/api/ideas \
           -H "Content-Type: application/json" \
           -d '{
             "title": "<short summary of the bullet>",
             "description": "Tech debt from: {{idea_title}} ({{idea_id}})\n\n<full bullet text>",
             "projectId": "{{project_id}}",
             "tags": ["tech-debt", "auto-generated"]
           }'

         If a POST fails, log the error (output it) but continue to the next bullet.
         Do NOT throw or exit early.

      4. Collect the IDs of all successfully created ideas into an array.
         If any were created, PATCH them back to the source idea:
         curl -s -X PATCH {{wintermute_base_url}}/api/ideas/{{idea_id}} \
           -H "Content-Type: application/json" \
           -d '{"techDebtItemIds": ["<id1>", "<id2>", ...]}'

      5. Output a summary: how many tech-debt items were created, their IDs,
         and whether the PATCH succeeded. If none were created, say so.

  # ── 8. Promote to production ──────────────────────────────────────────────
  - id: promote
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw
    timeoutSeconds: 300
    prompt: |
      Check the staging verification result, then promote to production if it passed.

      Staging result:
      {{verify_staging.text}}

      If the staging result contains "STAGING VERIFICATION FAILED", output
      "promote: ABORTED — staging verification failed, production NOT reloaded"
      and stop. Do not run any further commands.

      Otherwise, run the promote script using the Bash tool:

        ~/wintermute/bin/promote

      If it exits 0, output "promote: success — production reloaded".
      If it exits non-zero, output "promote: FAILED — production NOT reloaded"
      followed by the script output.
      Do not attempt to fix failures — just report them.

  # ── 9. Backup after successful deploy ────────────────────────────────────
  - id: backup
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw
    timeoutSeconds: 120
    prompt: |
      Run the backup script after a successful deployment.

      Use the Bash tool to run:

        ~/backups/wintermuteos-backup/backup.sh 2>&1

      If it exits 0, output "backup: success".
      If it exits non-zero, log the error output but output "backup: completed with errors (non-blocking)"
      — do NOT fail or stop the pipeline.

  - id: result
    type: output
    source: backup

edges:
  - { from: { node: intake },          to: { node: parse_plan } }
  - { from: { node: parse_plan },      to: { node: compute_waves } }
  - { from: { node: compute_waves },   to: { node: story_loop } }
  - { from: { node: story_loop },      to: { node: write_tests } }
  - { from: { node: write_tests },     to: { node: build_verify } }
  - { from: { node: build_verify },    to: { node: reload_staging } }
  - { from: { node: reload_staging },  to: { node: verify_staging } }
  - { from: { node: verify_staging },       to: { node: validate_build_output } }
  - { from: { node: validate_build_output }, to: { node: create_tech_debt_items } }
  - { from: { node: create_tech_debt_items }, to: { node: promote } }
  - { from: { node: promote },         to: { node: backup } }
  - { from: { node: backup },          to: { node: result } }
