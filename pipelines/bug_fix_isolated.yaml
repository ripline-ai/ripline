# Bug Fix (Isolated)
# Identical intent to bug_fix, but each run gets its own git workspace.
# The fix is implemented on a branch fix/<bug_id> inside a cloned copy of the
# repo at /workspace/repo — the shared /home/openclaw checkout is NEVER mutated.
# After build_verify the promote_isolated step rebases onto main, runs tests,
# and pushes back to the host repo before calling the existing promote script
# to reload production.
#
# Inputs:
#   bug_id — Wintermute bug ID (required)
#
# Flow:
#   intake → fetch_bug → parse_bug → pm_triage → setup_workspace
#          → fix → write_tests → build_verify
#          → reload_staging → verify_staging → patch_bug
#          → rebase_branch → resolve_conflicts → promote_isolated → result
#
# Isolation design:
#   - Container mounts /home/openclaw read-only (for git source + secrets)
#   - setup_workspace clones the target repo to /workspace/repo and creates
#     a fix branch fix/<bug_id>
#   - All fix / test / verify work uses /workspace/repo as cwd
#   - promote_isolated: rebase onto main → npm test → push to host via
#     file:/// URL → call ~/wintermute/bin/promote
#   - flock /tmp/ripline-promote.lock serialises concurrent promote steps

id: bug_fix_isolated
name: Bug Fix Pipeline (Isolated)
queue: build
entry: [intake]
container:
  # Read-only bind of /home/openclaw so the container can read git sources,
  # SSH keys, and ~/.config/claude without being able to mutate the host.
  # /workspace is an ephemeral directory inside the container (not mounted).
  volumes:
    /home/openclaw: /home/openclaw:ro

nodes:
  - id: intake
    type: input

  # ── 1. Fetch bug from Wintermute ─────────────────────────────────────────
  - id: fetch_bug
    type: agent
    runner: codex
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw
    timeoutSeconds: 90
    prompt: |
      Run the following curl command exactly as written. Output ONLY the raw JSON response — no explanation, no markdown fencing, no prose.

      curl -s {{env.WINTERMUTE_URL}}/api/bugs/{{bug_id}}

  - id: parse_bug
    type: transform
    expression: "(function(text) { var t = text.trim(); var start = t.indexOf('{'); var end = t.lastIndexOf('}'); if (start !== -1 && end !== -1 && end > start) { try { return JSON.parse(t.slice(start, end + 1)); } catch(e) {} } var m = t.match(/```(?:json)?\\s*([\\s\\S]*?)\\s*```/); return JSON.parse(m ? m[1].trim() : t); })(artifacts.fetch_bug.text)"

  # ── 2. Triage ─────────────────────────────────────────────────────────────
  - id: pm_triage
    type: agent
    runner: codex
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw/wintermute
    timeoutSeconds: 300
    prompt: |
      QA has filed a bug report. Triage it from a product perspective and produce a clear brief for engineering.

      Bug Report:
      ID: {{parse_bug.id}}
      Title: {{parse_bug.title}}
      Description: {{parse_bug.description}}
      Severity: {{parse_bug.severity}}

      1. Confirm it is a real product issue (vs. won't-fix or out-of-scope)
      2. Assign priority: P1 (blocking), P2 (important), P3 (nice-to-fix)
      3. Add product context that helps engineering fix it correctly
      4. Write clear, testable acceptance criteria for the fix

      Output a structured engineering brief:
      - Priority, title, product context, acceptance criteria
      - Call out any won't-fix decisions and why

  # ── 2b. Set up isolated workspace ────────────────────────────────────────
  # Clones the relevant repo (wintermute or ripline) into /workspace/repo,
  # then creates fix branch fix/<bug_id>.  The clone source is the read-only
  # host mount at /home/openclaw/<project>.
  #
  # The project is inferred from the bug's project field; falls back to wintermute
  # if unrecognised or absent.
  - id: setup_workspace
    type: agent
    runner: codex
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw
    timeoutSeconds: 120
    prompt: |
      Set up an isolated git workspace for this bug fix run. Use the Bash tool.

      ## Inputs
      Bug ID:      {{parse_bug.id}}
      Bug Project: {{parse_bug.project}}

      ## Steps

      1. Determine the source repo path:
         - If the bug project field contains "ripline": SOURCE=/home/openclaw/ripline
         - Otherwise (default): SOURCE=/home/openclaw/wintermute

      2. Clone the source repo into /workspace/repo (the /home/openclaw mount is
         read-only, so we clone from there):
         ```
         git clone file://$SOURCE /workspace/repo
         ```

      3. Configure git identity inside the clone (needed for commits):
         ```
         git -C /workspace/repo config user.email "ripline-build@openclaw.local"
         git -C /workspace/repo config user.name "Ripline Build"
         ```

      4. Create and switch to the fix branch:
         ```
         git -C /workspace/repo checkout -b fix/{{parse_bug.id}}
         ```

      5. Output exactly:
         WORKSPACE=/workspace/repo
         BRANCH=fix/{{parse_bug.id}}
         SOURCE=<resolved source path>

      If any step fails, output the error and stop — do not proceed.

  # ── 3. Fix ────────────────────────────────────────────────────────────────
  - id: fix
    type: agent
    runner: codex
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /workspace/repo
    timeoutSeconds: 1800
    prompt: |
      Fix the following bug. Work exclusively in the isolated workspace at /workspace/repo —
      do NOT touch /home/openclaw/wintermute or /home/openclaw/ripline directly.

      Bug ID: {{parse_bug.id}}
      Title: {{parse_bug.title}}
      Description: {{parse_bug.description}}

      Engineering brief from triage:
      {{pm_triage.text}}

      Steps:
      1. Verify you are on branch fix/{{parse_bug.id}}:
         git -C /workspace/repo branch --show-current
         If not on the fix branch, run: git -C /workspace/repo checkout fix/{{parse_bug.id}}
      2. Identify the affected files and root cause
      3. Implement the fix
      4. Do NOT write tests — that happens in the next step
      5. Do NOT run the test suite
      6. Commit with message: fix: {{parse_bug.title}} [{{parse_bug.id}}]

      Output a summary: what the root cause was, what was changed and why, which files were modified.

  # ── 4. Write tests ────────────────────────────────────────────────────────
  - id: write_tests
    type: agent
    runner: codex
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /workspace/repo
    timeoutSeconds: 900
    prompt: |
      The bug below has been fixed. Your job is to write tests that cover the bug scenario
      and any edge cases discovered during the fix. Work exclusively in the isolated workspace
      at /workspace/repo — do NOT touch /home/openclaw/wintermute or /home/openclaw/ripline directly.

      Bug ID: {{parse_bug.id}}
      Title: {{parse_bug.title}}
      Description: {{parse_bug.description}}

      Fix summary from the previous step:
      {{fix.text}}

      Steps:
      1. Verify you are on branch fix/{{parse_bug.id}}; switch if needed.
      2. Read the fix summary to understand what changed and why
      3. Write tests that document the correct behavior and cover:
         - The specific bug scenario (regression test)
         - Edge cases identified during the fix
      4. Tests should document correct behavior — they are not driving the implementation
      5. Do NOT run the tests — that happens in build_verify
      6. Commit with message: test: add coverage for {{parse_bug.title}} [{{parse_bug.id}}]

      Output a summary: what tests were written, what scenarios they cover, which files were added or modified.

  # ── 5. Build verification ─────────────────────────────────────────────────
  # Runs entirely inside /workspace/repo — no network push yet.
  - id: build_verify
    type: shell
    cwd: /workspace/repo
    timeoutSeconds: 120
    failOnNonZero: false
    command: |
      npm run build 2>&1 | tail -10
      echo "---BUILD_EXIT:$?"
      npm test -- --passWithNoTests --testPathIgnorePatterns=e2e 2>&1 | \
        grep -E "(FAIL|PASS|Tests:|Test Suites:|✕|✗|×|●|ERROR|error TS)" || true
      echo "---TEST_EXIT:${PIPESTATUS[0]}"

  # ── 6. Reload staging ────────────────────────────────────────────────────
  - id: reload_staging
    type: agent
    runner: codex
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw
    timeoutSeconds: 120
    prompt: |
      Sync the production vault to staging, then reload both staging services so they
      pick up the freshly-built code. Use the Bash tool to run these three commands:

      1. ~/wintermute/scripts/vault-sync
      2. /home/openclaw/.npm-global/bin/pm2 reload wintermute-staging
      3. /home/openclaw/.npm-global/bin/pm2 reload ripline-staging

      Output "staging ready" when all three succeed, or report the error and stop.

  # ── 7. E2E smoke test against staging ────────────────────────────────────
  - id: verify_staging
    type: agent
    runner: codex
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw/wintermute
    timeoutSeconds: 300
    prompt: |
      Run the e2e smoke tests against the staging stack to verify the fix end-to-end
      before promoting to production.

      Use the Bash tool:

        cd /home/openclaw/wintermute && \
          WINTERMUTE_URL=http://localhost:3001 RIPLINE_URL=http://localhost:4002 \
          npx jest tests/e2e/smoke-consolidated-flow.test.ts --no-coverage 2>&1 | tail -30

      If all tests pass, output "staging verified — ready to promote".
      If any tests fail, output "STAGING VERIFICATION FAILED" followed by the failure
      details. Do not proceed — the pipeline will continue to the promote step but
      promote_isolated will see this failure and refuse to reload production.

  # ── 8. Patch bug status to fixed ─────────────────────────────────────────
  - id: patch_bug
    type: agent
    runner: codex
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw
    timeoutSeconds: 90
    prompt: |
      Run this Python script using the Bash tool:

      python3 << 'PYEOF'
      import json, os, subprocess

      bug_id = "{{bug_id}}"
      wintermute_url = os.environ.get("WINTERMUTE_URL", "http://localhost:3000")
      body = {"status": "fixed"}

      r = subprocess.run(
          ["curl", "-s", "-X", "PATCH",
           f"{wintermute_url}/api/bugs/{bug_id}",
           "-H", "Content-Type: application/json",
           "-d", json.dumps(body)],
          capture_output=True, text=True
      )
      print(r.stdout)
      PYEOF

      After the script runs, echo "patch_bug complete" and stop.

  # ── 9a. Rebase fix branch onto main ──────────────────────────────────────
  # Attempts a clean rebase. If conflicts are found, emits REBASE_STATUS=conflict
  # and lists the conflicted files so resolve_conflicts can fix them.
  - id: rebase_branch
    type: shell
    cwd: /workspace/repo
    timeoutSeconds: 120
    failOnNonZero: false
    command: |
      git fetch origin main
      git checkout fix/{{parse_bug.id}}
      git rebase -X theirs origin/main
      if [ $? -eq 0 ]; then
        echo "REBASE_STATUS=clean"
      else
        CONFLICTED=$(git diff --name-only --diff-filter=U | tr '\n' ',' | sed 's/,$//')
        echo "REBASE_STATUS=conflict"
        echo "CONFLICTED_FILES=$CONFLICTED"
      fi

  # ── 9b. Resolve rebase conflicts (if any) ────────────────────────────────
  # Claude reads each conflicted file, understands both sides, writes a resolved
  # version, then continues the rebase.
  - id: resolve_conflicts
    type: agent
    runner: codex
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /workspace/repo
    timeoutSeconds: 600
    prompt: |
      A git rebase of fix/{{parse_bug.id}} onto origin/main may have produced conflicts.

      ## Rebase status
      {{rebase_branch.output}}

      If the output contains "REBASE_STATUS=clean", output "resolve_conflicts: nothing to do — rebase was clean" and stop.

      Otherwise, for each path listed in CONFLICTED_FILES:
      1. Read the file (it contains conflict markers: <<<<<<<, =======, >>>>>>>)
      2. Understand both sides of the conflict in the context of what fix/{{parse_bug.id}} is fixing
      3. Write the fully-resolved file content (no conflict markers) back to disk
      4. Stage the file: git add <path>

      After all files are resolved, continue the rebase:
      ```bash
      GIT_EDITOR=true git rebase --continue
      ```

      If `git rebase --continue` exits non-zero, output "resolve_conflicts: FAILED — <reason>" and stop.
      Otherwise output "resolve_conflicts: success — all conflicts resolved".

  # ── 10. Isolated promote ──────────────────────────────────────────────────
  # Merges the fix branch back to main in the workspace clone, runs tests,
  # pushes to the host repo via file:// URL, then calls the existing promote
  # script to reload production.
  #
  # A flock on /tmp/ripline-promote.lock serialises concurrent promote steps
  # so two parallel runs cannot race to push to the host repo simultaneously.
  #
  # Image rebuild: after a successful promote, rebuilds the wintermute-build-env
  # Docker image from ~/wintermute/docker/Dockerfile and pushes to GHCR if
  # GHCR_TOKEN is set in the environment.
  - id: promote_isolated
    type: agent
    runner: codex
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /workspace/repo
    timeoutSeconds: 600
    prompt: |
      Merge the isolated fix branch back to main and promote to production.

      ## Staging verification result
      {{verify_staging.text}}

      If the staging result contains "STAGING VERIFICATION FAILED", output
      "promote_isolated: ABORTED — staging verification failed, production NOT reloaded"
      and stop immediately. Do not run any further commands.

      ## Conflict resolution result
      {{resolve_conflicts.text}}

      If the conflict resolution result contains "resolve_conflicts: FAILED", output
      "promote_isolated: ABORTED — conflict resolution failed, production NOT reloaded"
      and stop immediately. Do not run any further commands.

      ## Merge + deploy flow
      Use the Bash tool for all steps. Acquire the promote lock first to prevent
      races with any other parallel run. Promotion must use the target project's
      deployment metadata instead of pushing into a checked-out host repo.

      ```bash
      # 1. Acquire promote lock (wait up to 10 minutes for it)
      exec 9>/tmp/ripline-promote.lock
      flock -w 600 9 || { echo "promote_isolated: FAILED — could not acquire promote lock"; exit 1; }

      # 2. Load project deployment metadata from Wintermute
      DEPLOY_ENV=/tmp/ripline-deploy-{{parse_bug.id}}.env
      python3 <<'PYEOF' > "$DEPLOY_ENV"
      import json
      import os
      import subprocess
      import urllib.request

      def shell_quote(value: str) -> str:
          return value.replace("\\", "\\\\").replace('"', '\\"')

      base_url = os.environ.get("WINTERMUTE_URL", "http://localhost:3000").rstrip("/")
      workspace = "/workspace/repo"
      project_hint = "{{parse_bug.project}}".strip().lower()
      project_id = ""
      project = {}

      try:
          with urllib.request.urlopen(f"{base_url}/api/projects") as resp:
              projects = json.load(resp)
      except Exception:
          projects = []

      if isinstance(projects, list):
          for candidate in projects:
              candidate_id = str(candidate.get("id") or "").strip()
              candidate_name = str(candidate.get("name") or "").strip().lower()
              candidate_path = str(candidate.get("localPath") or "").strip().lower()
              if project_hint and (
                  project_hint in candidate_id.lower()
                  or project_hint in candidate_name
                  or (candidate_path and project_hint in candidate_path)
              ):
                  project = candidate
                  project_id = candidate_id
                  break

      metadata = project.get("metadata") or {}
      deployment = project.get("deploymentMetadata") or {}
      local_path = (project.get("localPath") or metadata.get("localPath") or "").strip()
      repo_remote = (deployment.get("repoRemote") or "").strip()
      deploy_checkout = (deployment.get("deployCheckout") or local_path or "").strip()
      deploy_branch = (deployment.get("deployBranch") or "main").strip() or "main"
      promote_strategy = (deployment.get("promoteStrategy") or "push_remote_and_sync_checkout").strip()
      reload_command = (deployment.get("reloadCommand") or deployment.get("promoteScript") or "").strip()

      if not repo_remote:
          for path in [deploy_checkout, local_path, workspace]:
              if path and os.path.isdir(os.path.join(path, ".git")):
                  try:
                      repo_remote = subprocess.check_output(
                          ["git", "-C", path, "remote", "get-url", "origin"],
                          text=True,
                          stderr=subprocess.DEVNULL,
                      ).strip()
                      if repo_remote:
                          break
                  except Exception:
                      pass

      print(f'PROJECT_ID="{shell_quote(project_id)}"')
      print(f'REPO_REMOTE="{shell_quote(repo_remote)}"')
      print(f'DEPLOY_CHECKOUT="{shell_quote(deploy_checkout)}"')
      print(f'DEPLOY_BRANCH="{shell_quote(deploy_branch)}"')
      print(f'PROMOTE_STRATEGY="{shell_quote(promote_strategy)}"')
      print(f'RELOAD_COMMAND="{shell_quote(reload_command)}"')
      PYEOF

      . "$DEPLOY_ENV"

      if [ -z "$REPO_REMOTE" ]; then
        echo "promote_isolated: FAILED — no canonical repo remote configured for bug project {{parse_bug.project}}"
        exit 1
      fi

      if [ "$PROMOTE_STRATEGY" != "push_remote_and_sync_checkout" ]; then
        echo "promote_isolated: FAILED — unsupported promote strategy: $PROMOTE_STRATEGY"
        exit 1
      fi

      if ! git -C /workspace/repo diff --quiet || ! git -C /workspace/repo diff --cached --quiet; then
        git -C /workspace/repo stash push --include-untracked \
          -m "ripline-promote-{{parse_bug.id}}" >/dev/null 2>&1 || true
        echo "promote_isolated: stashed workspace changes before rebase"
      fi

      git -C /workspace/repo fetch "$REPO_REMOTE" "$DEPLOY_BRANCH"
      git -C /workspace/repo rebase -X theirs FETCH_HEAD || {
        echo "promote_isolated: FAILED — could not rebase fix/{{parse_bug.id}} onto $REPO_REMOTE/$DEPLOY_BRANCH"
        exit 1
      }
      git -C /workspace/repo checkout -B "$DEPLOY_BRANCH" FETCH_HEAD
      git -C /workspace/repo merge --no-ff fix/{{parse_bug.id}} \
        -m "fix({{parse_bug.id}}): {{parse_bug.title}} — isolated fix merge" || {
        echo "promote_isolated: FAILED — merge into $DEPLOY_BRANCH failed"
        exit 1
      }

      npm --prefix /workspace/repo test -- --passWithNoTests --testPathIgnorePatterns=e2e 2>&1 | tail -40
      TEST_EXIT=${PIPESTATUS[0]}
      if [ "$TEST_EXIT" != "0" ]; then
        echo "promote_isolated: FAILED — tests red after merge, production NOT reloaded"
        exit 1
      fi

      git -C /workspace/repo push "$REPO_REMOTE" "$DEPLOY_BRANCH" || {
        echo "promote_isolated: FAILED — push to $REPO_REMOTE $DEPLOY_BRANCH failed"
        exit 1
      }

      echo "promote_isolated: pushed $DEPLOY_BRANCH to $REPO_REMOTE"

      if [ -n "$DEPLOY_CHECKOUT" ]; then
        if [ ! -d "$DEPLOY_CHECKOUT/.git" ]; then
          mkdir -p "$(dirname "$DEPLOY_CHECKOUT")"
          git clone "$REPO_REMOTE" "$DEPLOY_CHECKOUT" || {
            echo "promote_isolated: FAILED — could not clone deploy checkout at $DEPLOY_CHECKOUT"
            exit 1
          }
        fi

        if ! git -C "$DEPLOY_CHECKOUT" diff --quiet || ! git -C "$DEPLOY_CHECKOUT" diff --cached --quiet; then
          echo "promote_isolated: deploy checkout had local changes — resetting $DEPLOY_CHECKOUT"
          git -C "$DEPLOY_CHECKOUT" reset --hard HEAD >/dev/null 2>&1 || true
          git -C "$DEPLOY_CHECKOUT" clean -fdx >/dev/null 2>&1 || true
        fi

        git -C "$DEPLOY_CHECKOUT" remote set-url origin "$REPO_REMOTE" || true
        git -C "$DEPLOY_CHECKOUT" fetch origin "$DEPLOY_BRANCH" || {
          echo "promote_isolated: FAILED — could not fetch deploy checkout from origin"
          exit 1
        }
        git -C "$DEPLOY_CHECKOUT" checkout -B "$DEPLOY_BRANCH" "origin/$DEPLOY_BRANCH" || {
          echo "promote_isolated: FAILED — could not checkout deploy branch in $DEPLOY_CHECKOUT"
          exit 1
        }
        git -C "$DEPLOY_CHECKOUT" reset --hard "origin/$DEPLOY_BRANCH" || {
          echo "promote_isolated: FAILED — could not reset deploy checkout to origin/$DEPLOY_BRANCH"
          exit 1
        }
        echo "promote_isolated: synced deploy checkout $DEPLOY_CHECKOUT"
      fi

      if [ -n "$RELOAD_COMMAND" ]; then
        DEPLOY_CHECKOUT="$DEPLOY_CHECKOUT" \
        DEPLOY_BRANCH="$DEPLOY_BRANCH" \
        PROJECT_ID="$PROJECT_ID" \
        REPO_REMOTE="$REPO_REMOTE" \
        bash -lc "$RELOAD_COMMAND"
        PROMOTE_EXIT=$?
        if [ "$PROMOTE_EXIT" != "0" ]; then
          echo "promote_isolated: FAILED — reload command failed, production may not have reloaded"
          exit 1
        fi
      fi

      echo "promote_isolated: success — deploy completed"

      if [ "$PROJECT_ID" = "project_wintermute" ]; then
        bash /home/openclaw/wintermute/docker/build-image.sh openclaw/build-env latest 2>&1 || \
          echo "promote_isolated: image rebuild failed (non-blocking)"
      fi
      ```

      Output a final status line:
      - "promote_isolated: success — deploy completed" on success
      - "promote_isolated: FAILED — <reason>" on any failure

  - id: result
    type: output
    source: promote_isolated

edges:
  - { from: { node: intake },           to: { node: fetch_bug } }
  - { from: { node: fetch_bug },        to: { node: parse_bug } }
  - { from: { node: parse_bug },        to: { node: pm_triage } }
  - { from: { node: pm_triage },        to: { node: setup_workspace } }
  - { from: { node: setup_workspace },  to: { node: fix } }
  - { from: { node: fix },              to: { node: write_tests } }
  - { from: { node: write_tests },      to: { node: build_verify } }
  - { from: { node: build_verify },     to: { node: reload_staging } }
  - { from: { node: reload_staging },   to: { node: verify_staging } }
  - { from: { node: verify_staging },   to: { node: patch_bug } }
  - { from: { node: patch_bug },         to: { node: rebase_branch } }
  - { from: { node: rebase_branch },    to: { node: resolve_conflicts } }
  - { from: { node: resolve_conflicts }, to: { node: promote_isolated } }
  - { from: { node: promote_isolated }, to: { node: result } }
