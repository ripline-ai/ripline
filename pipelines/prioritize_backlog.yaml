# Prioritize Backlog Pipeline
# Fetches all open ideas and bugs from Wintermute, scores and ranks them using
# weighted factors, writes back updated priorities, and produces a report.
# Input: stage ("staging" | "production", default "production")
id: prioritize_backlog
name: Prioritize Backlog
description: >
  Agent-maintained backlog prioritization. Fetches open ideas and bugs,
  evaluates each on impact/effort ratio, transitive block count, bug severity,
  staleness, and blocked status, then writes back stack-ranked priorities and
  a markdown report to the Obsidian vault.
entry: [intake]

contracts:
  input:
    type: object
    properties:
      stage:
        type: string
        enum: [staging, production]
        default: production

nodes:
  - id: intake
    type: input

  # Resolve Wintermute base URL and Obsidian vault path from stage
  - id: resolve_config
    type: transform
    expression: |
      (function() {
        var stage = (inputs.stage || 'production').toLowerCase();
        var port = stage === 'staging' ? 3001 : 3000;
        var vault = stage === 'staging'
          ? '/home/openclaw/obsidian-staging'
          : '/home/openclaw/obsidian';
        return {
          stage: stage,
          apiBase: 'http://localhost:' + port,
          vaultPath: vault,
          reportPath: vault + '/Operations/prioritization-report.md'
        };
      })()

  # Fetch all open ideas and bugs from the Wintermute API
  - id: fetch_backlog
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw
    timeoutSeconds: 120
    prompt: |
      Run this exact Python script using the Bash tool:

      python3 << 'PYEOF'
      import json, subprocess

      api_base = "{{ resolve_config.apiBase }}"

      ideas_r = subprocess.run(["curl", "-s", f"{api_base}/api/ideas"], capture_output=True, text=True)
      bugs_r  = subprocess.run(["curl", "-s", f"{api_base}/api/bugs?status=open"], capture_output=True, text=True)

      ideas_raw = json.loads(ideas_r.stdout)
      bugs_raw  = json.loads(bugs_r.stdout)

      # Trim to only the fields needed for ranking — keeps payload small
      idea_fields = ["id","title","status","impactScore","effortScore","priority","priorityLocked","priorityPinned","lastRankedAt","updatedAt","createdAt","tags","projectId","blocks","blockedBy"]
      bug_fields  = ["id","title","status","severity","priority","priorityLocked","priorityPinned","lastRankedAt","updatedAt","createdAt","projectId"]

      ideas = [{k: i.get(k) for k in idea_fields} for i in (ideas_raw if isinstance(ideas_raw, list) else [])]
      bugs  = [{k: b.get(k) for k in bug_fields}  for b in (bugs_raw  if isinstance(bugs_raw,  list) else [])]

      print(json.dumps({"ideas": ideas, "bugs": bugs}))
      PYEOF

      Output ONLY the raw JSON that the script prints. No explanation, no markdown fences.

  # Parse the fetched data
  - id: parse_backlog
    type: transform
    expression: |
      (function(text) {
        var t = text.trim();
        var start = t.indexOf('{'); var end = t.lastIndexOf('}');
        if (start !== -1 && end > start) { try { return JSON.parse(t.slice(start, end+1)); } catch(e) {} }
        var m = t.match(/```(?:json)?\s*([\s\S]*?)\s*```/);
        return JSON.parse(m ? m[1].trim() : t);
      })(artifacts.fetch_backlog.text)

  # Separate pinned items from unpinned — pinned items keep their current priority
  - id: separate_pinned
    type: transform
    expression: |
      (function(data) {
        var pinned = [];
        var unpinned = { ideas: [], bugs: [] };
        (data.ideas || []).forEach(function(i) {
          if (i.priorityPinned) { pinned.push({ id: i.id, type: 'idea', title: i.title, priority: i.priority || 0, pinned: true }); }
          else { unpinned.ideas.push(i); }
        });
        (data.bugs || []).forEach(function(b) {
          if (b.priorityPinned) { pinned.push({ id: b.id, type: 'bug', title: b.title, priority: b.priority || 0, pinned: true }); }
          else { unpinned.bugs.push(b); }
        });
        return { pinned: pinned, unpinned: unpinned, hasPinned: pinned.length > 0 };
      })(artifacts.parse_backlog)

  # Use Claude to evaluate and rank every item (unpinned only)
  - id: prioritize
    type: agent
    runner: claude-code
    mode: plan
    model: claude-sonnet-4-6
    timeoutSeconds: 300
    prompt: |
      You are a backlog prioritization agent. Analyze the following items and produce a
      stack-ranked JSON array with composite scores.

      **NOTE:** Items with `priorityPinned: true` have already been removed from this
      list — they retain their current positions. You are scoring only unpinned items.

      ## Backlog Data
      {{separate_pinned.unpinned}}

      ## Stability — Prefer Minimal Re-ordering
      Items include a `lastRankedAt` timestamp and their current `priority` (rank).
      **Only significantly re-order items whose inputs have materially changed** since
      `lastRankedAt` — e.g., status changed, scores updated, dependencies added/resolved,
      or the item is brand-new (no `lastRankedAt`).
      For items whose relevant inputs are unchanged since last ranking, **preserve their
      current relative order** unless a new/changed item must be inserted between them.
      This ensures that running the pipeline twice with no underlying changes produces
      an identical ordering.

      Items with `priorityLocked: true` will be skipped by the write-back endpoint, but
      you should still include them in the output at their current rank position so the
      ordering is complete.

      ## Scoring Factors (weights)
      For each item, evaluate these factors on a 0-100 sub-scale then combine:

      1. **Impact / Effort ratio** (weight 0.30)
         - For ideas: use impactScore and effortScore if available. High impact + low effort = high score.
         - For bugs: critical/high severity = high impact; estimate effort from diagnosis/proposedFix complexity.

      2. **Transitive block count** (weight 0.25)
         - Ideas that transitively block many others score higher.
         - Use the transitiveBlockCount or blocks fields. Bugs get 0 here unless linked to a blocking idea.

      3. **Bug severity** (weight 0.20)
         - critical=100, high=75, medium=50, low=25. Ideas get a baseline of 40.

      4. **Staleness** (weight 0.15)
         - Items not updated in a long time score higher (they need attention).
         - Score = min(100, daysSinceUpdate * 2). Use updatedAt or createdAt.

      5. **Blocked status penalty** (weight 0.10)
         - Items that ARE blocked (isBlocked=true or have non-empty blockedBy) get 0.
         - Unblocked items get 100.

      Composite score = (factor1 * 0.30) + (factor2 * 0.25) + (factor3 * 0.20) + (factor4 * 0.15) + (factor5 * 0.10)

      ## Output Requirements
      Output ONLY a raw JSON array (no markdown fencing, no explanation). Each element:
      {
        "id": "<item id>",
        "type": "idea" | "bug",
        "title": "<title>",
        "compositeScore": <number 0-100, rounded to 1 decimal>,
        "rank": <1-based integer>,
        "factors": {
          "impactEffort": <0-100>,
          "blockCount": <0-100>,
          "severity": <0-100>,
          "staleness": <0-100>,
          "blockedPenalty": <0-100>
        },
        "reasoning": "<1-2 sentence explanation for top-10 items, empty string otherwise>"
      }

      Sort by compositeScore descending. Assign rank = position in sorted order (1 = highest priority).
      IMPORTANT: Output ONLY the JSON array.

  # Parse ranked results
  - id: parse_rankings
    type: transform
    expression: |
      (function(text) {
        var m = text.match(/```(?:json)?\s*([\s\S]*?)\s*```/);
        return JSON.parse(m ? m[1] : text.trim());
      })(artifacts.prioritize.text)

  # Merge pinned items back into the ranked list, preserving their priority positions
  - id: merge_rankings
    type: transform
    expression: |
      (function(ranked, pinnedData) {
        var pinned = pinnedData.pinned || [];
        if (pinned.length === 0) { return ranked; }

        // Unpinned items sorted by compositeScore descending (as returned by LLM)
        var unpinned = ranked.slice().sort(function(a, b) { return b.compositeScore - a.compositeScore; });

        // Pinned items sorted by their existing priority descending (higher = more important)
        pinned.sort(function(a, b) { return (b.priority || 0) - (a.priority || 0); });

        // Build merged list: pinned items reserve score slots, unpinned fill around them.
        // Strategy: create a combined list sorted by score, where pinned items keep their
        // exact priority value as compositeScore and unpinned items get adjusted scores
        // to avoid collisions.

        // Convert pinned items to ranking format
        var pinnedEntries = pinned.map(function(p) {
          return {
            id: p.id,
            type: p.type,
            title: p.title,
            compositeScore: p.priority || 0,
            rank: 0,
            factors: { impactEffort: 0, blockCount: 0, severity: 0, staleness: 0, blockedPenalty: 0 },
            reasoning: '[PINNED] Priority preserved from previous ranking',
            pinned: true
          };
        });

        // Combine all items
        var all = pinnedEntries.concat(unpinned.map(function(u) { u.pinned = false; return u; }));

        // Sort by compositeScore descending
        all.sort(function(a, b) { return b.compositeScore - a.compositeScore; });

        // Resolve score collisions: if an unpinned item has the same score as a pinned item,
        // nudge the unpinned item down slightly
        var usedScores = {};
        pinnedEntries.forEach(function(p) { usedScores[p.compositeScore.toFixed(1)] = true; });

        all.forEach(function(item) {
          if (!item.pinned) {
            var score = item.compositeScore;
            var key = score.toFixed(1);
            while (usedScores[key]) {
              score = Math.round((score - 0.1) * 10) / 10;
              key = score.toFixed(1);
            }
            item.compositeScore = score;
            usedScores[key] = true;
          } else {
            usedScores[item.compositeScore.toFixed(1)] = true;
          }
        });

        // Re-sort and assign final ranks
        all.sort(function(a, b) { return b.compositeScore - a.compositeScore; });
        all.forEach(function(item, i) { item.rank = i + 1; });

        return all;
      })(artifacts.parse_rankings, artifacts.separate_pinned)

  # Write priorities back via bulk-priority endpoints and generate the report
  - id: apply_and_report
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw
    timeoutSeconds: 180
    prompt: |
      You have a ranked backlog. Write the priorities back to the Wintermute API and
      generate a prioritization report.

      ## Configuration
      - API base: {{ resolve_config.apiBase }}
      - Report path: {{ resolve_config.reportPath }}
      - Stage: {{ resolve_config.stage }}

      ## Ranked Items (merged — includes both pinned and unpinned)
      {{merge_rankings}}

      ## Pinned Items (for reference)
      {{separate_pinned.pinned}}

      ## Step 1 — Write priorities back

      **IMPORTANT:** Items with `"pinned": true` in the ranked list must be SKIPPED
      during the write-back — their priority is already correct and must not be
      overwritten. Log each skipped pinned item like:
        "[PINNED] Skipping <type> '<title>' (id: <id>) — priority preserved at <compositeScore>"

      For the remaining (unpinned) items, separate by type. For ideas, call:
        curl -s -X POST {{ resolve_config.apiBase }}/api/ideas/bulk-priority \
          -H "Content-Type: application/json" \
          -d '<JSON array of {id, priority} where priority = compositeScore (0-100 float, higher = more important)>'

      For bugs, call:
        curl -s -X POST {{ resolve_config.apiBase }}/api/bugs/bulk-priority \
          -H "Content-Type: application/json" \
          -d '<JSON array of {id, priority} where priority = compositeScore (0-100 float, higher = more important)>'

      Print the response from each call.

      ## Step 2 — Write prioritization report

      Ensure the directory exists: mkdir -p "$(dirname '{{ resolve_config.reportPath }}')"

      Write a markdown file to {{ resolve_config.reportPath }} with this structure:

      ```
      # Backlog Prioritization Report
      **Generated:** <current ISO date>
      **Stage:** {{ resolve_config.stage }}
      **Total items ranked:** <count>
      **Pinned items (unchanged):** <count of pinned items, or 0>

      ## Top 10 — Detailed Reasoning
      For each of the top 10 items, write:
      ### <rank>. [<type>] <title>
      - **Score:** <compositeScore>/100
      - **Impact/Effort:** <score> | **Block Count:** <score> | **Severity:** <score> | **Staleness:** <score> | **Blocked:** <score>
      - **Reasoning:** <the reasoning string>

      ## Full Ranking
      | Rank | Type | ID | Title | Score | Pinned |
      |------|------|----|-------|-------|--------|
      ... one row per item (mark pinned items with 📌) ...

      ## Scoring Methodology
      - Impact/Effort ratio (30%)
      - Transitive block count (25%)
      - Bug severity (20%)
      - Staleness (15%)
      - Blocked status penalty (10%)
      ```

      After writing the file, output "DONE" and the number of ideas and bugs updated,
      plus the number of pinned items that were skipped.

  - id: result
    type: output
    source: apply_and_report
    path: prioritization.result

edges:
  - { from: { node: intake },           to: { node: resolve_config } }
  - { from: { node: resolve_config },   to: { node: fetch_backlog } }
  - { from: { node: fetch_backlog },    to: { node: parse_backlog } }
  - { from: { node: parse_backlog },    to: { node: separate_pinned } }
  - { from: { node: separate_pinned },  to: { node: prioritize } }
  - { from: { node: prioritize },       to: { node: parse_rankings } }
  - { from: { node: parse_rankings },   to: { node: merge_rankings } }
  - { from: { node: merge_rankings },   to: { node: apply_and_report } }
  - { from: { node: apply_and_report }, to: { node: result } }
