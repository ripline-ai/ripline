# Diagnose and Fix Bug Pipeline
# Fetches a bug from Wintermute, reads the relevant project code,
# diagnoses the root cause, implements a fix via Claude Code,
# commits to a branch, and patches the bug status back to Wintermute.
#
# Inputs:
#   bug_id — Wintermute bug ID (required)
#
# Flow:
#   intake → fetch_bug → parse_bug → fetch_project → parse_project
#          → diagnose → parse_fix → patch_bug → result

id: diagnose_and_fix_bug
name: Diagnose and Fix Bug
entry: [intake]

nodes:
  - id: intake
    type: input

  # ── 1. Fetch bug from Wintermute ─────────────────────────────────────────
  - id: fetch_bug
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw
    timeoutSeconds: 30
    prompt: |
      Run the following curl command exactly as written. Output ONLY the raw JSON response — no explanation, no markdown fencing, no prose.

      curl -s http://localhost:3000/api/bugs/{{bug_id}}

  - id: parse_bug
    type: transform
    expression: "(function(text) { var t = text.trim(); var start = t.indexOf('{'); var end = t.lastIndexOf('}'); if (start !== -1 && end !== -1 && end > start) { try { return JSON.parse(t.slice(start, end + 1)); } catch(e) {} } var m = t.match(/```(?:json)?\\s*([\\s\\S]*?)\\s*```/); return JSON.parse(m ? m[1].trim() : t); })(artifacts.fetch_bug.text)"

  # ── 2. Fetch linked project from Wintermute ───────────────────────────────
  - id: fetch_project
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw
    timeoutSeconds: 30
    prompt: |
      The bug below may have a projectId field. If it does, run:

        curl -s http://localhost:3000/api/projects/<projectId>

      If there is no projectId, run:

        curl -s http://localhost:3000/api/projects

      and pick the single project whose name or metadata.localPath appears most relevant to the bug title "{{parse_bug.title}}".

      Bug JSON:
      {{parse_bug}}

      Output ONLY the raw JSON of a single project object — no explanation, no markdown fencing, no prose.

  - id: parse_project
    type: transform
    expression: "(function(text) { var m = text.match(/```(?:json)?\\s*([\\s\\S]*?)\\s*```/); var raw = JSON.parse(m ? m[1] : text.trim()); var proj = Array.isArray(raw) ? raw[0] : raw; var localPath = (proj.metadata && proj.metadata.localPath) ? proj.metadata.localPath : '/home/openclaw/' + proj.name.toLowerCase(); return { projectId: proj.id, projectName: proj.name, localPath: localPath, description: proj.description || '' }; })(artifacts.fetch_project.text)"

  # ── 3. Diagnose and implement fix ────────────────────────────────────────
  - id: diagnose
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: "{{parse_project.localPath}}"
    timeoutSeconds: 300
    prompt: |
      You are a senior engineer tasked with diagnosing and fixing a bug in this codebase.

      ## Bug Details
      ID: {{parse_bug.id}}
      Title: {{parse_bug.title}}
      Description: {{parse_bug.description}}
      Severity: {{parse_bug.severity}}
      Source: {{parse_bug.source}}
      {{#if parse_bug.stackTrace}}Stack Trace:
      {{parse_bug.stackTrace}}{{/if}}
      {{#if parse_bug.url}}URL: {{parse_bug.url}}{{/if}}

      ## Project
      Name: {{parse_project.projectName}}
      Path: {{parse_project.localPath}}

      ## Instructions
      1. Read the codebase thoroughly — understand the project structure, relevant files, and how the affected code path works.
      2. Diagnose the root cause of the bug based on the title, description, stack trace, and code.
      3. Implement a clean, minimal fix. Avoid unrelated changes.
      4. Create (or checkout) a branch named fix/{{parse_bug.id}} — replace any slashes in the bug ID with hyphens:
           git checkout -b fix/{{parse_bug.id}} 2>/dev/null || git checkout fix/{{parse_bug.id}}
         (If the bug ID contains slashes, replace them with hyphens in the branch name.)
      5. Commit your fix with a descriptive message like: "fix({{parse_bug.id}}): <brief description>"

      After completing the fix, output a JSON object with exactly these two fields and nothing else:
      {
        "fixDescription": "<concise description of root cause and what was changed to fix it>",
        "fixBranch": "fix/<bug-id-with-slashes-replaced-by-hyphens>"
      }

      Output ONLY the JSON object — no markdown fencing, no prose before or after.

  - id: parse_fix
    type: transform
    expression: "(function(text) { var t = text.trim(); var start = t.indexOf('{'); var end = t.lastIndexOf('}'); if (start !== -1 && end !== -1 && end > start) { try { return JSON.parse(t.slice(start, end + 1)); } catch(e) {} } var m = t.match(/```(?:json)?\\s*([\\s\\S]*?)\\s*```/); return JSON.parse(m ? m[1].trim() : t); })(artifacts.diagnose.text)"

  # ── 4. Patch bug status back to Wintermute ────────────────────────────────
  - id: patch_bug
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw
    timeoutSeconds: 30
    prompt: |
      Run the following curl command to update the bug status in Wintermute.

      The fix details are:
        fixDescription: {{parse_fix.fixDescription}}
        fixBranch: {{parse_fix.fixBranch}}

      Build a JSON body with these fields and run:

      curl -s -X PATCH http://localhost:3000/api/bugs/{{bug_id}} \
        -H "Content-Type: application/json" \
        -d '<JSON_BODY>'

      Where <JSON_BODY> is a properly JSON-escaped object containing:
        status: "fixed"
        fixDescription: <parse_fix.fixDescription>
        fixBranch: <parse_fix.fixBranch>

      Output ONLY the raw JSON response from the server — no explanation, no markdown fencing.

  - id: result
    type: output
    source: patch_bug

edges:
  - { from: { node: intake },        to: { node: fetch_bug } }
  - { from: { node: fetch_bug },     to: { node: parse_bug } }
  - { from: { node: parse_bug },     to: { node: fetch_project } }
  - { from: { node: fetch_project }, to: { node: parse_project } }
  - { from: { node: parse_project }, to: { node: diagnose } }
  - { from: { node: diagnose },      to: { node: parse_fix } }
  - { from: { node: parse_fix },     to: { node: patch_bug } }
  - { from: { node: patch_bug },     to: { node: result } }
