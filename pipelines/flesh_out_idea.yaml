# Flesh Out Idea Pipeline
# Reads a stub idea from Wintermute, reads the linked project context,
# generates a full structured idea (title, description, rationale, implementation,
# tradeoffs, impactScore, effortScore, tags), and writes it back.
#
# Inputs:
#   idea_id  — Wintermute idea ID (required)
#   stage    — "production" or "staging" (default: "production")
#              production → localhost:3000 (Wintermute), localhost:4001 (Ripline)
#              staging    → localhost:3001 (Wintermute), localhost:4002 (Ripline)

id: flesh_out_idea
name: Flesh Out Idea
queue: spec
entry: [intake]

nodes:
  - id: intake
    type: input

  - id: resolve_urls
    type: transform
    expression: "(function() { var s = (inputs.stage || 'production').toLowerCase(); var wp = s === 'staging' ? 3001 : 3000; var rp = s === 'staging' ? 4002 : 4001; return { wintermute_url: 'http://localhost:' + wp, ripline_url: 'http://localhost:' + rp }; })()"

  # ── 1. Read idea from Wintermute ─────────────────────────────────────────
  - id: fetch_idea
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw
    timeoutSeconds: 30
    prompt: |
      Run the following curl command exactly as written. Output ONLY the raw JSON response — no explanation, no markdown fencing, no prose.

      curl -s {{resolve_urls.wintermute_url}}/api/ideas/{{idea_id}}

  - id: parse_idea
    type: transform
    expression: "(function(text) { var t = text.trim(); var start = t.indexOf('{'); var end = t.lastIndexOf('}'); if (start !== -1 && end !== -1 && end > start) { try { return JSON.parse(t.slice(start, end + 1)); } catch(e) {} } var m = t.match(/```(?:json)?\\s*([\\s\\S]*?)\\s*```/); return JSON.parse(m ? m[1].trim() : t); })(artifacts.fetch_idea.text)"

  # ── 2. Read linked project from Wintermute ───────────────────────────────
  - id: fetch_project
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw
    timeoutSeconds: 30
    prompt: |
      The idea below has a projectId field. If it has one, run:

        curl -s {{resolve_urls.wintermute_url}}/api/projects/<projectId>

      If there is no projectId, run:

        curl -s {{resolve_urls.wintermute_url}}/api/projects

      and pick the first project whose name or metadata.localPath appears most relevant to the idea title "{{parse_idea.title}}".

      Idea JSON:
      {{parse_idea}}

      Output ONLY the raw JSON of a single project object — no explanation, no markdown fencing, no prose.

  - id: parse_project
    type: transform
    expression: "(function(text) { var m = text.match(/```(?:json)?\\s*([\\s\\S]*?)\\s*```/); var raw = JSON.parse(m ? m[1] : text.trim()); var proj = Array.isArray(raw) ? raw[0] : raw; var localPath = (proj.metadata && proj.metadata.localPath) ? proj.metadata.localPath : '/home/openclaw/' + proj.name.toLowerCase(); var pipelinePath = (proj.metadata && proj.metadata.pipelinePath) ? proj.metadata.pipelinePath : null; var projectType = (proj.metadata && proj.metadata.type) ? proj.metadata.type : 'code'; return { projectId: proj.id, projectName: proj.name, localPath: localPath, pipelinePath: pipelinePath, projectType: projectType, description: proj.description || '' }; })(artifacts.fetch_project.text)"

  # ── 3. Read project context ───────────────────────────────────────────────
  - id: read_context
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw
    timeoutSeconds: 120
    prompt: |
      {{#if (eq parse_project.projectType "operations")}}
      This is an operations project representing cross-cutting improvements to the overall OpenClaw stack. Read the vault's key reference files and produce a structured summary.

      Run these commands and capture output (use bash):

      1. cat {{parse_project.localPath}}/reference.md 2>/dev/null || echo "(no reference.md)"
      2. cat {{parse_project.localPath}}/CLAUDE.md 2>/dev/null || echo "(no CLAUDE.md)"
      3. find {{parse_project.localPath}}/Projects -maxdepth 2 -name "*.md" 2>/dev/null | head -40
      4. For each markdown file found in Projects/ (up to 10), print its filename and contents:
         for f in $(find {{parse_project.localPath}}/Projects -maxdepth 2 -name "*.md" 2>/dev/null | head -10); do echo "=== $f ==="; cat "$f"; echo; done

      Produce a concise structured summary covering:
      - The overall stack architecture (Ripline, Wintermute, YouTube pipeline, Obsidian vault)
      - Current agent coordination patterns and workflows
      - Existing project notes and decisions captured in Projects/
      - Any documented pain points, roadmap items, or open questions
      {{else if (eq parse_project.projectType "pipeline-operation")}}
      This is a pipeline-operation project. Explore the pipeline and channel configs and produce a structured summary.

      Run these commands and capture output (use bash):

      1. find {{parse_project.pipelinePath}} -maxdepth 2 -name "*.yaml" -o -name "*.yml" 2>/dev/null | head -60
      2. For each pipeline YAML found (up to 10), print its filename and first 30 lines:
         for f in $(find {{parse_project.pipelinePath}} -maxdepth 2 -name "*.yaml" | head -10); do echo "=== $f ==="; head -30 "$f"; echo; done
      3. find {{parse_project.localPath}} -maxdepth 3 2>/dev/null | head -80
      4. For any config or markdown files in {{parse_project.localPath}}, print a brief excerpt.

      Produce a concise structured summary covering:
      - Pipeline names, their purpose, and key steps (from the YAML files)
      - Channel configs and their structure (from localPath)
      - Overall workflow: how content moves from idea to produced video
      {{else}}
      Explore the codebase at {{parse_project.localPath}} and produce a structured summary.

      Run these commands and capture output (use bash):

      1. cat {{parse_project.localPath}}/CLAUDE.md 2>/dev/null || echo "(no CLAUDE.md)"
      2. cat {{parse_project.localPath}}/README.md 2>/dev/null || echo "(no README.md)"
      3. git -C {{parse_project.localPath}} log --oneline -15 2>/dev/null || echo "(no git log)"
      4. find {{parse_project.localPath}} -maxdepth 2 -not -path '*/node_modules/*' -not -path '*/.git/*' -not -path '*/dist/*' -not -path '*/.next/*' 2>/dev/null | head -80

      Produce a concise structured summary covering:
      - Project purpose and tech stack (from CLAUDE.md / README)
      - Recent git activity (last 15 commits)
      - Top-level directory structure
      {{/if}}

  # ── 3b. Analyze whether the idea should be decomposed ────────────────────
  - id: analyze_decomposition
    type: agent
    runner: claude-code
    mode: execute
    timeoutSeconds: 120
    prompt: |
      You are a senior product architect. Analyze whether the following idea is a compound idea that should be split into smaller, independent ideas.

      ## Idea
      Title: {{parse_idea.title}}
      Description: {{parse_idea.description}}
      {{#if parse_idea.rationale}}Rationale: {{parse_idea.rationale}}{{/if}}

      ## Project Context
      Project: {{parse_project.projectName}}
      Description: {{parse_project.description}}
      {{read_context.text}}

      ---

      ## Analysis Guidelines

      Apply a CONSERVATIVE bias — only recommend splitting when:
      - The idea clearly targets DIFFERENT systems or subsystems (e.g., frontend vs backend vs pipeline)
      - The sub-parts have meaningfully different timelines or priorities
      - The sub-parts could be implemented and delivered independently with standalone value
      - Combining them creates confusion about scope, ownership, or acceptance criteria

      Do NOT recommend splitting when:
      - The parts are tightly coupled steps of a single workflow
      - Splitting would create sub-ideas that have no standalone value
      - The idea is simply large but cohesive

      Produce a JSON object with these exact fields:

      {
        "shouldSplit": <boolean — true only if the idea clearly contains independent concerns>,
        "confidence": <number 0-1 — how confident you are in the recommendation>,
        "reasoning": "<1-3 sentences explaining why or why not to split>",
        "subIdeas": [
          {
            "title": "<proposed sub-idea title>",
            "description": "<1-2 sentence description>"
          }
        ]
      }

      If shouldSplit is false, subIdeas should be an empty array.

      Output ONLY the JSON object — no markdown fencing, no prose.

  - id: parse_decomposition
    type: transform
    expression: "(function(text) { var t = text.trim(); var start = t.indexOf('{'); var end = t.lastIndexOf('}'); if (start !== -1 && end !== -1 && end > start) { try { return JSON.parse(t.slice(start, end + 1)); } catch(e) {} } var m = t.match(/```(?:json)?\\s*([\\s\\S]*?)\\s*```/); return JSON.parse(m ? m[1].trim() : t); })(artifacts.analyze_decomposition.text)"

  # ── 3c. Propose split (placeholder) — logs sub-ideas to artifacts ────────
  - id: propose_split
    type: transform
    expression: |
      (function(d) {
        var proposal = {
          originalTitle: artifacts.parse_idea.title,
          shouldSplit: d.shouldSplit,
          confidence: d.confidence,
          reasoning: d.reasoning,
          subIdeas: d.subIdeas
        };
        return proposal;
      })(artifacts.parse_decomposition)

  # ── 4. Generate full structured idea ─────────────────────────────────────
  - id: generate_idea
    type: agent
    runner: claude-code
    mode: execute
    timeoutSeconds: 300
    prompt: |
      You are a senior product and engineering thinker. Given the following stub idea and project context, flesh it out into a complete, well-reasoned idea with all fields populated.

      ## Stub Idea
      Title: {{parse_idea.title}}
      Description: {{parse_idea.description}}
      {{#if parse_idea.rationale}}Why It's Beneficial: {{parse_idea.rationale}}{{/if}}
      {{#if parse_idea.implementation}}How It Would Work: {{parse_idea.implementation}}{{/if}}
      {{#if parse_idea.tradeoffs}}Tradeoffs: {{parse_idea.tradeoffs}}{{/if}}
      {{#if parse_idea.mvpScope}}MVP Scope: {{parse_idea.mvpScope}}{{/if}}

      ## Project
      Name: {{parse_project.projectName}}
      Path: {{parse_project.localPath}}
      Description: {{parse_project.description}}

      ## Project Context
      {{read_context.text}}

      ---

      Produce a JSON object with these exact fields:

      {
        "title": "Refined, specific title (keep or improve the original)",
        "description": "What the idea is — 2-4 clear sentences",
        "rationale": "Why this is beneficial — concrete value for users, the product, or ops. 2-5 sentences.",
        "implementation": "How it would work — rough approach, key components, major dependencies. Use bullet points.",
        "tradeoffs": "Honest drawbacks or risks — complexity, maintenance, edge cases. Use bullet points.",
        "impactScore": <integer 1-5 — use the FULL range, calibrated as:
          1 = trivial cosmetic or convenience tweak; affects almost no one
          2 = small improvement to an existing flow; noticeable but not critical
          3 = meaningful feature or fix that unblocks a real workflow for regular users
          4 = high-value capability that significantly improves a core part of the product
          5 = transformative — changes how the whole system works or unlocks an entirely new class of use
          Avoid defaulting to 3. Push toward 1-2 for polish/cleanup, 4-5 for core capabilities.>,
        "effortScore": <integer 1-5 — use the FULL range, calibrated as:
          1 = trivial — a config change, a one-liner, or a single-file tweak (< 1 hour)
          2 = small — a few files, well-understood change, no API design needed (half a day)
          3 = moderate — multiple components, some design decisions, a few hours of work
          4 = substantial — new subsystem or significant refactor; touches many files; a full day+
          5 = major — multi-session epic; new infrastructure, deep integration, or significant unknowns
          Avoid defaulting to 3. Small bug fixes and config tweaks should be 1-2; only novel systems are 4-5.>,
        "techDebt": "Known tech debt this implementation would introduce — shortcuts, deferred work, or architectural compromises. Use a bullet-point list. If none, use an empty string.",
        "tags": ["tag1", "tag2", "tag3"]
      }

      Output ONLY the JSON object — no markdown fencing, no prose.

  - id: parse_generated
    type: transform
    expression: "(function(text) { var t = text.trim(); var start = t.indexOf('{'); var end = t.lastIndexOf('}'); if (start !== -1 && end !== -1 && end > start) { try { return JSON.parse(t.slice(start, end + 1)); } catch(e) {} } var m = t.match(/```(?:json)?\\s*([\\s\\S]*?)\\s*```/); return JSON.parse(m ? m[1].trim() : t); })(artifacts.generate_idea.text)"

  # ── 4b. Suggest Focus Area via keyword overlap ──────────────────────────
  - id: fetch_focus_areas
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw
    timeoutSeconds: 30
    prompt: |
      Run the following curl command exactly as written. Output ONLY the raw JSON response — no explanation, no markdown fencing, no prose.

      curl -s {{resolve_urls.ripline_url}}/api/focus-areas

  - id: suggest_focus_area
    type: transform
    expression: |
      (function() {
        var idea = artifacts.parse_generated;
        var faRaw = artifacts.fetch_focus_areas.text.trim();
        var faData;
        try {
          var start = faRaw.indexOf('{');
          var end = faRaw.lastIndexOf('}');
          if (start !== -1 && end > start) { faData = JSON.parse(faRaw.slice(start, end + 1)); }
          else { faData = JSON.parse(faRaw); }
        } catch(e) { return { suggestedFocusAreaId: null }; }
        var focusAreas = faData.focusAreas || [];
        var active = focusAreas.filter(function(fa) { return fa.status === 'active'; });
        if (active.length === 0) return { suggestedFocusAreaId: null };
        var ideaText = ((idea.title || '') + ' ' + (idea.description || '') + ' ' + (idea.rationale || '') + ' ' + ((idea.tags || []).join(' '))).toLowerCase();
        var stopWords = ['the','a','an','and','or','but','in','on','at','to','for','of','with','by','is','are','was','were','be','been','being','have','has','had','do','does','did','will','would','could','should','may','might','shall','can','need','must','it','its','this','that','these','those','i','we','you','he','she','they','me','us','him','her','them','my','our','your','his','their','not','no','from','as','into','about','between','through','during','before','after','above','below','up','down','out','off','over','under','then','than','so','if','when','where','how','what','which','who','whom','why','all','each','every','both','few','more','most','other','some','such','only','own','same','just','also','very','even','back','now','new','old','first','last','long','great','small','large','next','early','young','important','different','used','make','like','use','many','way','well','get'];
        function tokenize(text) {
          return text.replace(/[^a-z0-9\s]/g, ' ').split(/\s+/).filter(function(w) {
            return w.length > 2 && stopWords.indexOf(w) === -1;
          });
        }
        var ideaTokens = tokenize(ideaText);
        if (ideaTokens.length === 0) return { suggestedFocusAreaId: null };
        var ideaSet = {};
        ideaTokens.forEach(function(t) { ideaSet[t] = true; });
        var bestId = null;
        var bestScore = 0;
        active.forEach(function(fa) {
          var faText = ((fa.name || '') + ' ' + (fa.description || '')).toLowerCase();
          var faTokens = tokenize(faText);
          if (faTokens.length === 0) return;
          var overlap = 0;
          faTokens.forEach(function(t) { if (ideaSet[t]) overlap++; });
          var score = overlap / faTokens.length;
          if (score > bestScore) { bestScore = score; bestId = fa.id; }
        });
        if (bestScore >= 0.3 && bestId) return { suggestedFocusAreaId: bestId };
        return { suggestedFocusAreaId: null };
      })()

  # ── 5. Patch idea back to Wintermute ─────────────────────────────────────
  - id: patch_idea
    type: agent
    runner: claude-code
    mode: execute
    dangerouslySkipPermissions: true
    cwd: /home/openclaw
    timeoutSeconds: 60
    prompt: |
      Write the following fleshed-out idea fields back to Wintermute for idea {{idea_id}}.

      The generated idea object:
      {{parse_generated}}

      The focus area suggestion:
      {{suggest_focus_area}}

      Build a JSON body with ALL of these fields (properly JSON-escaped):
        status: "specced"
        title: <parse_generated.title>
        description: <parse_generated.description>
        rationale: <parse_generated.rationale>
        implementation: <parse_generated.implementation>
        tradeoffs: <parse_generated.tradeoffs>
        techDebt: <parse_generated.techDebt — include this field even if empty string>
        impactScore: <parse_generated.impactScore as a number>
        effortScore: <parse_generated.effortScore as a number>
        tags: <parse_generated.tags as a JSON array>

      If suggest_focus_area.suggestedFocusAreaId is a non-null string, also include:
        suggestedFocusAreaId: <suggest_focus_area.suggestedFocusAreaId>
      If it is null, do NOT include the suggestedFocusAreaId field at all.

      Run (replacing <JSON_BODY> with the properly constructed and escaped JSON):

      curl -s -X PATCH {{resolve_urls.wintermute_url}}/api/ideas/{{idea_id}} \
        -H "Content-Type: application/json" \
        -d '<JSON_BODY>'

      Output ONLY the raw JSON response from the server.

  - id: result
    type: output
    source: patch_idea

edges:
  - { from: { node: intake },          to: { node: resolve_urls } }
  - { from: { node: resolve_urls },   to: { node: fetch_idea } }
  - { from: { node: fetch_idea },      to: { node: parse_idea } }
  - { from: { node: parse_idea },      to: { node: fetch_project } }
  - { from: { node: fetch_project },   to: { node: parse_project } }
  - { from: { node: parse_project },   to: { node: read_context } }
  - { from: { node: read_context },            to: { node: analyze_decomposition } }
  - { from: { node: analyze_decomposition },   to: { node: parse_decomposition } }
  # Conditional branching: compound ideas route through propose_split first
  - from: { node: parse_decomposition }
    to: { node: propose_split }
    when: "artifacts.parse_decomposition.shouldSplit === true && artifacts.parse_decomposition.confidence >= 0.7"
  - from: { node: parse_decomposition }
    to: { node: generate_idea }
    when: "!(artifacts.parse_decomposition.shouldSplit === true && artifacts.parse_decomposition.confidence >= 0.7)"
  - { from: { node: propose_split },              to: { node: generate_idea } }
  - { from: { node: generate_idea },   to: { node: parse_generated } }
  - { from: { node: parse_generated }, to: { node: fetch_focus_areas } }
  - { from: { node: fetch_focus_areas }, to: { node: suggest_focus_area } }
  - { from: { node: suggest_focus_area }, to: { node: patch_idea } }
  - { from: { node: patch_idea },      to: { node: result } }
