# Spec → Build → Queue (define with Sonnet, implement with Haiku, verify with Sonnet)
# Input: task (string) — the feature or idea to spec and break down.
# Use a profile to set projectRoot for spawned implement_story runs and for the verify step.
id: spec_then_build_queue
name: Spec → Build → Queue
entry: [intake]
nodes:
  - id: intake
    type: input

  # Define flows and break into stories (Sonnet for reasoning)
  - id: spec
    type: agent
    runner: claude-code
    mode: execute
    model: claude-sonnet-4-6
    timeoutSeconds: 300
    prompt: "Write a clear user-flow and design spec for: {{task}}"

  - id: decompose
    type: agent
    runner: claude-code
    mode: execute
    model: claude-sonnet-4-6
    timeoutSeconds: 300
    prompt: |
      Based on the spec below, break the feature into small, atomic implementation stories. Each story should be completable in a single focused session. Include title, description, and acceptance criteria for each.

      Spec:
      {{spec.text}}

  - id: queue
    type: agent
    runner: claude-code
    mode: execute
    model: claude-sonnet-4-6
    prompt: |
      Output ONLY a valid JSON array — no markdown fencing, no explanation, no prose. Each element must have exactly these keys: id (string), title (string), description (string). Create one element per implementation task based on:

      {{decompose.text}}

  - id: parse
    type: transform
    expression: "(function(text) { var m = text.match(/```(?:json)?\\s*([\\s\\S]*?)\\s*```/); var raw = JSON.parse(m ? m[1] : text.trim()); return raw.map(function(t) { return { id: String(t.id), title: t.title, detail: t.detail || t.description || '' }; }); })(artifacts.queue.text)"

  # Fan-out: one implement_story run per task (Haiku, in child pipeline)
  - id: spawn
    type: enqueue
    pipelineId: implement_story
    tasksSource: parse
    mode: per-item

  # Collect child run results (including any failures) for verification
  - id: collect
    type: collect_children
    description: "Gather child run results so verify can see partial failures"

  # After all stories finish: build, tests, and sense-check (Sonnet)
  - id: verify
    type: agent
    runner: claude-code
    mode: execute
    model: claude-sonnet-4-6
    cwd: "{{ run.inputs.projectRoot }}"
    timeoutSeconds: 300
    prompt: |
      The parent run just completed multiple implementation stories. Summary: {{artifacts.collect.summary}}.

      Child results (per story):
      {{JSON.stringify(artifacts.collect.childResults, null, 2)}}

      In the project at the current working directory: run the build and test suite. If anything fails, summarize what broke and which story (taskId) might be responsible. If everything passes, confirm the implementation makes sense relative to the original spec and suggest any follow-up improvements. Be concise.

  - id: result
    type: output
    source: verify

edges:
  - { from: { node: intake },    to: { node: spec } }
  - { from: { node: spec },      to: { node: decompose } }
  - { from: { node: decompose }, to: { node: queue } }
  - { from: { node: queue },     to: { node: parse } }
  - { from: { node: parse },     to: { node: spawn } }
  - { from: { node: spawn },     to: { node: collect } }
  - { from: { node: collect },   to: { node: verify } }
  - { from: { node: verify },    to: { node: result } }
